    --red: #ff003c;
    --yellow: #ffe600;
    --bg: #000000;
    --bg2: #050f05;
    --bg3: #0a1a0a;
    --card: #071007;
    --border: #00ff4133;
    --glow: 0 0 10px #00ff41aa, 0 0 30px #00ff4144;
    --glow2: 0 0 6px #00fff5aa;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    cursor: none;

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s;
    mix-blend-mode: screen;
  }
  .cursor-dot {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Matrix rain canvas */
  #matrix {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.015) 2px,
      rgba(0,255,65,0.015) 4px

    pointer-events: none;
    z-index: 1;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;

    z-index: 1;
    opacity: 0.4;
  }

  .wrapper { position: relative; z-index: 2; }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 50px 20px 30px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, #00ff4115 0%, transparent 70%);
    pointer-events: none;
  }

  .skull {
    font-size: 50px;
    display: block;
    animation: pulse 2s infinite;
    filter: drop-shadow(0 0 15px var(--green));
  }

  .main-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 5vw, 56px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: var(--glow);
    animation: flicker 4s infinite;
    line-height: 1.1;
  }

  .sub-title {
    font-family: 'VT323', monospace;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--cyan);
    letter-spacing: 6px;
    margin-top: 8px;
    text-shadow: var(--glow2);
  }

  .header-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .stat-box {
    border: 1px solid var(--border);
    padding: 10px 20px;
    background: rgba(0,255,65,0.03);
    position: relative;
  }
  .stat-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 10px;
    width: 30px; height: 2px;
    background: var(--bg);
  }
  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    color: var(--green);
    font-weight: 700;
    text-shadow: var(--glow);
  }
  .stat-label {
    font-size: 11px;
    color: #00aa22;
    letter-spacing: 2px;
  }

  /* ===== TERMINAL BAR ===== */
  .terminal-bar {
    background: #050f05;
    border-bottom: 1px solid var(--border);
    padding: 10px 30px;
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 13px;
  }
  .terminal-dots span {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    margin-right: 5px;
  }
  .dot-r { background: #ff5f56; box-shadow: 0 0 5px #ff5f56; }
  .dot-y { background: #ffbd2e; box-shadow: 0 0 5px #ffbd2e; }
  .dot-g { background: #27c93f; box-shadow: 0 0 5px #27c93f; }
  .terminal-path { color: #00aa22; }
  .terminal-cursor {
    display: inline-block;
    width: 8px; height: 16px;
    background: var(--green);
    animation: blink 1s infinite;
    vertical-align: middle;
  }

  /* ===== SEARCH BAR ===== */
  .search-container {
    padding: 25px 30px;
    max-width: 800px;
    margin: 0 auto;
  }
  .search-wrapper {
    position: relative;
    border: 1px solid var(--green2);
    background: rgba(0,255,65,0.03);
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: inset 0 0 20px rgba(0,255,65,0.05), var(--glow);
  }
  .search-prefix { color: var(--green); margin-right: 10px; font-size: 16px; }
  .search-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    flex: 1;
    padding: 14px 0;
    caret-color: var(--green);
  }
  .search-input::placeholder { color: #004d15; }

  /* ===== DAY FILTER ===== */
  .filter-section {
    padding: 0 30px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .filter-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #007722;
    margin-bottom: 12px;
  }
  .day-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .day-btn {
    padding: 5px 12px;
    border: 1px solid #00ff4133;
    background: transparent;
    color: #00aa22;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: none;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .day-btn:hover, .day-btn.active {
    background: rgba(0,255,65,0.1);
    border-color: var(--green);
    color: var(--green);
    box-shadow: var(--glow);
  }
  .day-btn.all-btn {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .day-btn.all-btn:hover, .day-btn.all-btn.active {
    background: rgba(0,255,245,0.1);
    box-shadow: var(--glow2);
  }

  main {

    margin: 0 auto;
    padding: 20px 30px 60px;
  }

  /* ===== DAY SECTION ===== */
  .day-section {
    margin-bottom: 40px;
    border: 1px solid #00ff4122;
    background: var(--card);
    position: relative;
    transition: border-color 0.3s;
  }
  .day-section:hover { border-color: #00ff4155; }

  .day-header {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 16px 20px;
    background: #071407;
    border-bottom: 1px solid #00ff4122;
    cursor: none;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .day-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 3px; height: 100%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);

    letter-spacing: 2px;

    padding: 3px 10px;
    border: 1px solid;
    letter-spacing: 2px;

  .badge-intermediate { border-color: var(--yellow); color: var(--yellow); }
  .badge-advanced { border-color: var(--red); color: var(--red); }
  .day-toggle {
    color: var(--green);
    font-size: 18px;
    transition: transform 0.3s;
  }
  .day-section.collapsed .day-toggle { transform: rotate(-90deg); }

  .commands-grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .day-section.collapsed .commands-grid { display: none; }

  /* ===== COMMAND CARD ===== */
  .cmd-card {
    border: 1px solid #00ff4120;
    background: #020802;
    padding: 14px;
    position: relative;
    transition: all 0.25s;
    overflow: hidden;
  }
  .cmd-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cmd-card:hover {
    border-color: #00ff4155;
    background: #031203;
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,255,65,0.1);
  }
  .cmd-card:hover::before { opacity: 1; }

  .cmd-line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .cmd-dollar { color: var(--green); font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .cmd-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--cyan);
    word-break: break-all;
    cursor: pointer;
    transition: color 0.2s;

  .cmd-text:hover { color: #fff; text-shadow: 0 0 8px var(--cyan); }
  .cmd-desc {
    font-size: 12px;
    color: #005520;
    margin-left: 20px;
    line-height: 1.5;
  }
  .cmd-tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 7px;
    border: 1px solid #00ff4130;
    color: #008822;
    margin-left: 20px;
    margin-top: 5px;
    letter-spacing: 1px;
  }

  /* Copy tooltip */
  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,255,65,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 25px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    box-shadow: var(--glow);

    padding: 30px;

    position: relative;
    z-index: 2;

  /* Animations */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { text-shadow: var(--glow); opacity:1; }
    20%,24%,55% { text-shadow:none; opacity:0.8; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: var(--green2); }

  /* Results count */
  .results-info {
    padding: 0 30px 15px;
    max-width: 1400px;
    margin: 0 auto;
    font-size: 12px;
    color: #006620;
    letter-spacing: 2px;
  }

  .no-results {
    text-align: center;
    padding: 60px;
    color: #003d10;
    font-size: 20px;
    display: none;
  }

  @media(max-width:600px) {
    header { padding: 30px 15px 20px; }
    main { padding: 15px; }
    .header-stats { gap: 20px; }
    .commands-grid { grid-template-columns: 1fr; }
    .day-filters { gap: 4px; }
  }
</style>

// ===== BUILD UI =====
function buildDayFilters() {
  const container = document.getElementById('dayFilters');
  let html = `<button class="day-btn all-btn active" onclick="filterDay('all', this)">ALL DAYS</button>`;
  for (let i = 1; i <= 30; i++) {
    html += `<button class="day-btn" onclick="filterDay(${i}, this)">D${i}</button>`;
  }
  container.innerHTML = html;
}

function getLevelBadge(level) {
  const map = { basic: 'badge-basic', intermediate: 'badge-intermediate', advanced: 'badge-advanced' };
  return `<span class="day-badge ${map[level]}">${level.toUpperCase()}</span>`;
}

function buildContent() {
  const main = document.getElementById('mainContent');
  let html = '';
  let total = 0;

  days.forEach(d => {
    total += d.cmds.length;
    const cmdsHtml = d.cmds.map(c => `
      <div class="cmd-card" onclick="copyCmd('${c.cmd.replace(/'/g, "\\'")}')">
        <div class="cmd-line">
          <span class="cmd-dollar">$</span>
          <span class="cmd-text">${escapeHtml(c.cmd)}</span>
        </div>
        <div class="cmd-desc"># ${c.desc}</div>
        <span class="cmd-tag">CLICK TO COPY</span>
      </div>
    `).join('');

    html += `
      <div class="day-section" id="day-${d.day}" data-day="${d.day}" data-level="${d.level}">
        <div class="day-header" onclick="toggleDay(${d.day})">
          <span class="day-num">DAY ${String(d.day).padStart(2,'0')}</span>
          <span class="day-title">${d.title}</span>
          ${getLevelBadge(d.level)}
          <span class="day-badge" style="border-color:#555;color:#555;margin-left:5px">${d.cmds.length} CMDS</span>
          <span class="day-toggle">▼</span>
        </div>
        <div class="commands-grid">${cmdsHtml}</div>
      </div>
    `;
  });

  main.innerHTML = html;
  document.getElementById('totalCmds').textContent = total + '+';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDay(day) {
  const el = document.getElementById('day-' + day);
  el.classList.toggle('collapsed');
}

// ===== FILTER =====
let activeDay = 'all';

function filterDay(day, btn) {
  activeDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
  if (day !== 'all') {
    setTimeout(() => {
      const el = document.getElementById('day-' + day);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function filterAll() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let visibleCount = 0;

  days.forEach(d => {
    const section = document.getElementById('day-' + d.day);
    const dayMatch = activeDay === 'all' || parseInt(activeDay) === d.day;

    if (!dayMatch) { section.classList.add('hidden'); return; }

    if (!query) {
      section.classList.remove('hidden');
      // Reset card visibility
      section.querySelectorAll('.cmd-card').forEach(c => c.style.display = '');
      visibleCount++;
      return;
    }

    let anyVisible = false;
    section.querySelectorAll('.cmd-card').forEach(card => {
      const txt = card.textContent.toLowerCase();
      if (txt.includes(query)) {
        card.style.display = '';
        anyVisible = true;
      } else {
        card.style.display = 'none';
      }
    });

    if (anyVisible) {
      section.classList.remove('hidden');
      visibleCount++;
    } else {
      section.classList.add('hidden');
    }
  });

  const info = document.getElementById('resultsInfo');
  const noRes = document.getElementById('noResults');
  if (query) {
    info.textContent = `// FOUND IN ${visibleCount} SECTIONS`;
    noRes.style.display = visibleCount === 0 ? 'block' : 'none';
  } else {
    info.textContent = '';
    noRes.style.display = 'none';
  }
}

// ===== COPY =====
function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = cmd; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ===== CURSOR =====
const cursor = document.getElementById('cursor');
const dot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e => {
  cursor.style.left = (e.clientX - 10) + 'px';
  cursor.style.top = (e.clientY - 10) + 'px';
  dot.style.left = (e.clientX - 2) + 'px';
  dot.style.top = (e.clientY - 2) + 'px';
});
document.addEventListener('mousedown', () => cursor.style.transform = 'scale(0.7)');
document.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');

// ===== MATRIX RAIN =====
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
const cols = Math.floor(canvas.width / 20);
const drops = Array(cols).fill(1);
const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ{}[]<>/\\|=+-_!@#$%^&*~';

function matrixDraw() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px Share Tech Mono';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * 20, y * 20);
    if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(matrixDraw, 50);

// INIT
buildDayFilters();
buildContent();
</script>
